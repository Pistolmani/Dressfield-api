name: Build and deploy ASP.Net Core app to Azure Web App - dressfield-api-prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.x"

      - name: Restore
        run: dotnet restore Dressfield.API/Dressfield.API.csproj

      - name: Build
        run: dotnet build Dressfield.API/Dressfield.API.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish Dressfield.API/Dressfield.API.csproj -c Release --no-build -o ./publish

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F080680956B04BD79FF4D88B693965C8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0039BA66AAE04D0C85F2EC433745AC8E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4AD31CD5E78E4152BABA245A92836CCB }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "dressfield-api-prod"
          slot-name: "Production"
          package: ./publish
          
